<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #secureTable { table-layout: auto; }
    #secureTable th,
    #secureTable td {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 20rem;
    }
    #secureTable thead th {
      background: #1e3a5f;
      color: #fff;
      font-weight: 700;
      font-size: 0.8125rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid #1e3a5f;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #secureTable tbody td {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e2e8f0;
      font-size: 0.8125rem;
      color: #334155;
    }
    #secureTable tbody tr:nth-child(even) td {
      background: #f8fafc;
    }
    #secureTable tbody tr:hover td {
      background: #f1f5f9;
    }

    /* Print styles for PDF export */
    @media print {
      body {
        background: white;
        margin: 0;
        padding: 0;
      }
      header,
      footer,
      #logoutBtn,
      #printBtn,
      #emailBtn,
      #emailModal {
        display: none !important;
      }
      main {
        max-width: 100%;
        padding: 0;
        margin: 0;
      }
      #secureTable {
        width: 100%;
        border-collapse: collapse;
        font-size: 10pt;
      }
      #secureTable thead th {
        background: #1e3a5f !important;
        color: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        position: static;
        page-break-inside: avoid;
      }
      #secureTable tbody td {
        border: 1px solid #ccc;
        padding: 0.4rem 0.5rem;
      }
      #secureTable tbody tr {
        page-break-inside: avoid;
      }
      #secureTable tbody tr:nth-child(even) td {
        background: #f8fafc !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .bg-white {
        background: white !important;
        box-shadow: none !important;
        border: none !important;
      }
      .overflow-auto {
        overflow: visible !important;
        max-height: none !important;
      }
      .min-w-max {
        min-width: auto !important;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <header class="bg-[#1e3a5f] text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <h1 id="secureTitle" class="text-xl sm:text-2xl font-semibold tracking-tight">
          Secure View
        </h1>
        <p class="mt-1 text-xs sm:text-sm text-white/80">
          View-only data from the selected tab.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <button
          id="printBtn"
          class="rounded-lg bg-white/20 hover:bg-white/30 text-white text-sm font-semibold px-4 py-2 transition"
        >
          Print to PDF
        </button>
        <button
          id="emailBtn"
          class="rounded-lg bg-white/20 hover:bg-white/30 text-white text-sm font-semibold px-4 py-2 transition"
        >
          Email PDF
        </button>
        <button
          id="logoutBtn"
          class="rounded-lg bg-white/20 hover:bg-white/30 text-white text-sm font-semibold px-4 py-2 transition"
        >
          Logout to main page
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6">
      <div id="secureStatus" class="text-sm text-slate-600 mb-3">
        Loading secure data...
      </div>
      <div class="overflow-auto max-h-[75vh]">
        <div class="min-w-max inline-block">
          <table id="secureTable" class="hidden border-collapse">
            <thead id="secureThead"></thead>
            <tbody id="secureTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Email Modal -->
  <div id="emailModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-md w-full mx-4">
      <h3 class="text-lg font-semibold text-slate-800 mb-4">Email PDF Report</h3>
      <form id="emailForm" class="space-y-4">
        <!-- Authorized Email Dropdown (if available) -->
        <div id="authorizedEmailSection" class="hidden">
          <label for="authorizedEmailSelect" class="block text-sm font-medium text-slate-700 mb-1">
            Select Authorized Email
          </label>
          <select
            id="authorizedEmailSelect"
            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus:border-[#1e3a5f] focus:ring-1 focus:ring-[#1e3a5f]/30"
          >
            <option value="">-- Select an email --</option>
          </select>
        </div>

        <!-- Manual Email Input -->
        <div>
          <label for="emailInput" class="block text-sm font-medium text-slate-700 mb-1">
            <span id="emailLabelText">Email Address</span>
            <span id="orText" class="hidden text-slate-500 font-normal"> (or enter manually)</span>
          </label>
          <input
            type="email"
            id="emailInput"
            required
            placeholder="your.email@example.com"
            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 placeholder:text-slate-400 focus:border-[#1e3a5f] focus:ring-1 focus:ring-[#1e3a5f]/30"
          />
        </div>
        <div id="emailStatus" class="text-sm hidden"></div>
        <div class="flex gap-3 justify-end">
          <button
            type="button"
            id="cancelEmailBtn"
            class="rounded-lg border border-slate-300 text-slate-700 text-sm font-semibold px-4 py-2 hover:bg-slate-50 transition"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="rounded-lg bg-[#1e3a5f] hover:bg-[#2d4a73] text-white text-sm font-semibold px-4 py-2 transition"
          >
            Send Email
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || "";
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadSecureTab() {
      const sheet = getQueryParam("sheet").trim();
      const titleEl = document.getElementById("secureTitle");
      const statusEl = document.getElementById("secureStatus");
      const thead = document.getElementById("secureThead");
      const tbody = document.getElementById("secureTbody");
      const table = document.getElementById("secureTable");

      if (!sheet) {
        statusEl.textContent = "Missing sheet/tab name in URL.";
        return;
      }

      document.title = sheet;
      titleEl.textContent = sheet;

      try {
        const params = new URLSearchParams();
        params.set("sheet", sheet);
        const response = await fetch("/api/tab?" + params.toString());
        const data = await response.json();

        if (!response.ok) {
          statusEl.textContent = data.error || "Failed to load secure data.";
          return;
        }

        const header = data.header || [];
        const rows = data.rows || [];

        let headerHtml = "<tr>";
        header.forEach((h) => {
          const text = (h !== undefined && h !== null) ? String(h) : "";
          headerHtml += `<th scope="col">${escapeHtml(text)}</th>`;
        });
        headerHtml += "</tr>";
        thead.innerHTML = headerHtml;

        let bodyHtml = "";
        rows.forEach((row) => {
          bodyHtml += "<tr>";
          header.forEach((_, idx) => {
            const cell = row[idx] !== undefined && row[idx] !== null ? String(row[idx]) : "";
            bodyHtml += `<td>${escapeHtml(cell)}</td>`;
          });
          bodyHtml += "</tr>";
        });
        tbody.innerHTML = bodyHtml;

        table.classList.remove("hidden");
        statusEl.textContent = "";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error contacting secure backend.";
      }
    }

    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", () => {
        window.location.href = "indexshipping.html";
      });
    }

    const printBtn = document.getElementById("printBtn");
    if (printBtn) {
      printBtn.addEventListener("click", async () => {
        const sheet = getQueryParam("sheet").trim();
        if (!sheet) {
          alert("Unable to determine which tab to print.");
          return;
        }

        try {
          const params = new URLSearchParams();
          params.set("sheet", sheet);
          const response = await fetch("/api/pdf-url?" + params.toString());
          const data = await response.json();

          if (!response.ok) {
            const errorMsg = data.error || "Failed to generate print URL.";
            const details = data.details ? `\n\nDetails: ${data.details}` : "";
            alert(errorMsg + details);
            console.error("PDF URL error:", data);
            return;
          }

          if (!data.pdfUrl) {
            alert("No PDF URL returned from server.");
            return;
          }

          // Open Google Sheets PDF export in landscape mode
          window.open(data.pdfUrl, "_blank");
        } catch (err) {
          console.error("Error generating print URL:", err);
          alert("Error generating print URL. Check console for details.");
        }
      });
    }

    // Email PDF functionality
    const emailBtn = document.getElementById("emailBtn");
    const emailModal = document.getElementById("emailModal");
    const emailForm = document.getElementById("emailForm");
    const emailInput = document.getElementById("emailInput");
    const emailStatus = document.getElementById("emailStatus");
    const cancelEmailBtn = document.getElementById("cancelEmailBtn");
    const authorizedEmailSelect = document.getElementById("authorizedEmailSelect");
    const authorizedEmailSection = document.getElementById("authorizedEmailSection");
    const emailLabelText = document.getElementById("emailLabelText");
    const orText = document.getElementById("orText");

    async function loadAuthorizedEmails() {
      const username = sessionStorage.getItem("loggedInUsername");
      if (!username) {
        // No username stored, hide authorized email section
        authorizedEmailSection.classList.add("hidden");
        emailLabelText.textContent = "Email Address";
        orText.classList.add("hidden");
        return;
      }

      try {
        // Try sessionStorage first
        const storedEmails = sessionStorage.getItem("authorizedEmails");
        let authorizedEmails = [];
        
        if (storedEmails) {
          authorizedEmails = JSON.parse(storedEmails);
        } else {
          // Fetch from API if not in sessionStorage
          const response = await fetch(`/api/authorized-emails?username=${encodeURIComponent(username)}`);
          const data = await response.json();
          if (response.ok && data.authorizedEmails) {
            authorizedEmails = data.authorizedEmails;
            sessionStorage.setItem("authorizedEmails", JSON.stringify(authorizedEmails));
          }
        }

        if (authorizedEmails.length > 0) {
          // Show dropdown and populate it
          authorizedEmailSection.classList.remove("hidden");
          emailLabelText.textContent = "Or Enter Email Address";
          orText.classList.remove("hidden");
          
          authorizedEmailSelect.innerHTML = '<option value="">-- Select an authorized email --</option>';
          authorizedEmails.forEach((email) => {
            const option = document.createElement("option");
            option.value = email;
            option.textContent = email;
            authorizedEmailSelect.appendChild(option);
          });
        } else {
          // No authorized emails, hide dropdown
          authorizedEmailSection.classList.add("hidden");
          emailLabelText.textContent = "Email Address";
          orText.classList.add("hidden");
        }
      } catch (err) {
        console.error("Error loading authorized emails:", err);
        authorizedEmailSection.classList.add("hidden");
        emailLabelText.textContent = "Email Address";
        orText.classList.add("hidden");
      }
    }

    // When authorized email is selected, populate the email input
    if (authorizedEmailSelect) {
      authorizedEmailSelect.addEventListener("change", (e) => {
        if (e.target.value) {
          emailInput.value = e.target.value;
        }
      });
    }

    if (emailBtn && emailModal) {
      emailBtn.addEventListener("click", async () => {
        await loadAuthorizedEmails();
        emailModal.classList.remove("hidden");
        emailInput.focus();
      });

      cancelEmailBtn?.addEventListener("click", () => {
        emailModal.classList.add("hidden");
        emailForm.reset();
        emailStatus.classList.add("hidden");
        authorizedEmailSelect.value = "";
      });

      emailForm?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const sheet = getQueryParam("sheet").trim();
        // Use selected authorized email or manual input
        const selectedEmail = authorizedEmailSelect?.value || "";
        const manualEmail = emailInput.value.trim();
        const email = selectedEmail || manualEmail;

        if (!sheet) {
          alert("Unable to determine which tab to email.");
          return;
        }

        if (!email) {
          alert("Please select an authorized email or enter an email address.");
          return;
        }

        emailStatus.classList.remove("hidden");
        emailStatus.textContent = "Sending email...";
        emailStatus.className = "text-sm text-blue-600";

        try {
          const response = await fetch("/api/email-pdf", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ sheet, email }),
          });

          const data = await response.json();

          if (!response.ok) {
            emailStatus.textContent = data.error || "Failed to send email.";
            emailStatus.className = "text-sm text-red-600";
            return;
          }

          emailStatus.textContent = data.message || `PDF sent successfully to ${email}`;
          emailStatus.className = "text-sm text-green-600";

          // Close modal after 2 seconds
          setTimeout(() => {
            emailModal.classList.add("hidden");
            emailForm.reset();
            emailStatus.classList.add("hidden");
          }, 2000);
        } catch (err) {
          console.error("Error sending email:", err);
          emailStatus.textContent = "Error sending email. Please try again.";
          emailStatus.className = "text-sm text-red-600";
        }
      });
    }

    loadSecureTab();
  </script>
</body>
</html>
